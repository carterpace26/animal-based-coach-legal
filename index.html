<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Animal Based Coach — Legal</title>
<style>
  :root { --bg:#0e0e10; --card:#161619; --tx:#e8e6e3; --dim:#9a978f; --line:#2a2a2f; --acc:#e0752d; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--tx);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; padding:32px 20px; }
  .wrap { max-width:480px; width:100%; }
  .eyebrow { color:var(--acc); font-size:12px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; margin-bottom:10px; }
  h1 { font-size:30px; margin:0 0 8px; letter-spacing:-.02em; }
  p.sub { color:var(--dim); margin:0 0 28px; }
  a.card { display:flex; align-items:center; justify-content:space-between; gap:16px;
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:18px 20px; margin-bottom:12px; text-decoration:none; color:var(--tx);
    transition:border-color .15s ease, transform .15s ease; }
  a.card:hover { border-color:var(--acc); transform:translateY(-1px); }
  a.card .t { font-weight:650; }
  a.card .d { color:var(--dim); font-size:14px; margin-top:2px; }
  a.card .arrow { color:var(--acc); font-size:20px; }
  footer { margin-top:28px; color:var(--dim); font-size:14px; }
  footer a { color:var(--acc); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Animal Based Coach</div>
  <h1>Legal</h1>
  <p class="sub">The two documents, in plain language.</p>

  <a class="card" href="privacy.html">
    <span>
      <div class="t">Privacy Policy</div>
      <div class="d">What we collect, and where it goes.</div>
    </span>
    <span class="arrow">→</span>
  </a>

  <a class="card" href="terms.html">
    <span>
      <div class="t">Terms of Use</div>
      <div class="d">Including the medical disclaimer.</div>
    </span>
    <span class="arrow">→</span>
  </a>

  <footer>Questions: <a href="mailto:carterpace26@gmail.com">carterpace26@gmail.com</a></footer>
</div>
</body>
</html>
